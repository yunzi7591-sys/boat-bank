name: Daily Schedule Sync

on:
  schedule:
    # 23:00 UTC = 08:00 JST - バックアップ用（メインは外部Cronサービス）
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync today's race schedule (v3 API)
        run: |
          curl -s --fail -X GET "https://boat-bank.vercel.app/api/cron/schedule" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
