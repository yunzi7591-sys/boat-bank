name: Daily Schedule Sync Cron

on:
  schedule:
    # Runs at 23:00 UTC every day, which is 08:00 JST
    - cron: '0 23 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1: Trigger Daily Schedule Sync
        run: |
          curl -s --fail -X GET "https://boat-bank.vercel.app/api/cron/schedule" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
      - name: Step 2: Trigger Schedule Data Supplementation
        run: |
          curl -s --fail -X GET "https://boat-bank.vercel.app/api/cron/supplement-schedule" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
