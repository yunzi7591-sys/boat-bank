name: BoatBank Cron Jobs

on:
  schedule:
    # Run sync-results every 5 minutes
    - cron: '*/5 * * * *'
    # Run schedule sync once a day at 22:00 UTC (07:00 JST)
    - cron: '0 22 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-sync-results:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync-results API endpoint
        env:
          TARGET_URL: ${{ secrets.CRON_TARGET_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$TARGET_URL" ]; then
            echo "CRON_TARGET_URL secret is not set. Skipping execution."
            exit 1
          fi
          
          echo "Triggering API sync-results..."
          
          # We use github secret to get the full domain e.g. https://your-app.vercel.app
          # The Authorization header is what Next.js route uses for Bearer token verification
          curl -X GET "$TARGET_URL/api/cron/sync-results" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --fail
          
          echo "API execution completed!"

  run-daily-schedule-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call daily sync API endpoint
        # Only run this step if the cron matches the daily schedule
        if: github.event.schedule == '0 22 * * *' || github.event_name == 'workflow_dispatch'
        env:
          TARGET_URL: ${{ secrets.CRON_TARGET_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$TARGET_URL" ]; then
            echo "CRON_TARGET_URL secret is not set. Skipping execution."
            exit 1
          fi
          
          echo "Triggering API daily schedule sync..."
          
          # The daily sync uses a query param `?secret=` instead of Bearer token in Phase 23 implementation
          curl -X GET "$TARGET_URL/api/sync?secret=$CRON_SECRET" \
            --fail
          
          echo "API execution completed!"
