name: 5-Minute Cron Sync

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  # Allows manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  sync-results:
    runs-on: ubuntu-latest
    steps:
      - name: Call Sync Results API
        run: |
          curl -s -X GET "https://boat-bank.vercel.app/api/cron/sync-results" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
