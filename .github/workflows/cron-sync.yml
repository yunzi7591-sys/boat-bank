name: Result Sync (Dispatch)

on:
  schedule:
    # 09:00-21:00 JST (= 00:00-12:00 UTC), 5分ごと
    - cron: '*/5 0-12 * * *'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch result sync
        run: |
          curl -s --fail -X GET "https://boatbank.jp/api/cron/dispatch-results" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
